<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 24px 24px 20px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .stats {
      font-size: 13px;
      opacity: 0.8;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      transition: background 0.15s;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-bar button {
      border: 1.5px solid #e2e8f0;
      background: #fff;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #64748b;
      transition: all 0.15s;
    }

    .filter-bar button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .list {
      padding: 8px 0;
      min-height: 80px;
      max-height: 480px;
      overflow-y: auto;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      padding: 40px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      transition: background 0.1s;
    }

    .item:hover {
      background: #f8fafc;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #1e293b;
      word-break: break-all;
      transition: all 0.2s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .item-delete {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .item-delete:hover {
      color: #ef4444;
    }

    .footer {
      padding: 12px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }

    .clear-btn:hover {
      color: #ef4444;
    }

    .clear-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="stats" id="stats">항목 없음</div>
  </div>

  <div class="input-area">
    <input type="text" id="newItem" placeholder="추가할 항목 입력..." maxlength="100" />
    <button id="addBtn" title="추가">+</button>
  </div>

  <div class="filter-bar">
    <button class="active" data-filter="all">전체</button>
    <button data-filter="active">미완료</button>
    <button data-filter="done">완료</button>
  </div>

  <div class="list" id="list"></div>

  <div class="footer">
    <button class="clear-btn" id="clearDone">완료 항목 삭제</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'shopping-list';

  let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function render() {
    const list = document.getElementById('list');
    const filtered = items.filter(item => {
      if (filter === 'active') return !item.done;
      if (filter === 'done') return item.done;
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">항목이 없습니다</div>';
    } else {
      list.innerHTML = filtered.map(item => `
        <div class="item${item.done ? ' checked' : ''}" data-id="${item.id}">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})" />
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="item-delete" onclick="remove(${item.id})" title="삭제">✕</button>
        </div>
      `).join('');
    }

    const total = items.length;
    const done = items.filter(i => i.done).length;
    document.getElementById('stats').textContent =
      total === 0 ? '항목 없음' : `${done} / ${total} 완료`;

    const doneExists = items.some(i => i.done);
    document.getElementById('clearDone').disabled = !doneExists;
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(text));
    return d.innerHTML;
  }

  function addItem() {
    const input = document.getElementById('newItem');
    const text = input.value.trim();
    if (!text) return;
    items.unshift({ id: Date.now(), text, done: false });
    save();
    render();
    input.value = '';
    input.focus();
  }

  function toggle(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.done = !item.done; save(); render(); }
  }

  function remove(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  document.getElementById('addBtn').addEventListener('click', addItem);

  document.getElementById('newItem').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  document.querySelectorAll('.filter-bar button').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('clearDone').addEventListener('click', () => {
    items = items.filter(i => !i.done);
    save();
    render();
  });

  render();
</script>
</body>
</html>
